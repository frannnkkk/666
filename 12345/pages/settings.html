<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置 - 长征纪念</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="stylesheet" href="../css/style.css">
  <style>
    /* 设置页面特定样式 */
    .settings-container {
      max-width: 800px;
      margin: 0 auto;
    }
    
    .settings-card {
      background-color: rgba(31, 41, 55, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }
    
    .settings-card h3 {
      font-size: 1.25rem;
      font-weight: bold;
      margin-bottom: 1rem;
      color: #dc2626;
      display: flex;
      align-items: center;
    }
    
    .settings-card h3 i {
      margin-right: 0.5rem;
    }
    
    .setting-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .setting-item:last-child {
      border-bottom: none;
    }
    
    .setting-label {
      display: flex;
      align-items: center;
    }
    
    .setting-label i {
      margin-right: 0.5rem;
      color: #d4af37;
    }
    
    /* 开关样式 */
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 60px;
      height: 34px;
    }
    
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #374151;
      transition: .4s;
      border-radius: 34px;
    }
    
    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 26px;
      width: 26px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    
    input:checked + .toggle-slider {
      background-color: #dc2626;
    }
    
    input:checked + .toggle-slider:before {
      transform: translateX(26px);
    }
    
    /* 下拉菜单样式 */
    .select-container {
      position: relative;
      min-width: 150px;
    }
    
    .select-container select {
      appearance: none;
      background-color: #374151;
      color: white;
      padding: 0.5rem 2.5rem 0.5rem 1rem;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      width: 100%;
    }
    
    .select-container:after {
      content: '\f078';
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: #d4af37;
    }
    
    /* 保存按钮 */
    .save-btn {
      background-color: #dc2626;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    
    .save-btn:hover {
      background-color: #b91c1c;
      transform: translateY(-2px);
    }
    
    .save-btn i {
      margin-right: 0.5rem;
    }
    
    /* 响应式设计 */
    @media (max-width: 768px) {
      .setting-item {
        flex-direction: column;
        align-items: flex-start;
      }
      
      .setting-label {
        margin-bottom: 0.5rem;
      }
      
      .select-container {
        width: 100%;
      }
    }
  </style>
</head>
<body class="overflow-x-hidden font-sans bg-gray-900 text-white">
  <!-- 导航栏 -->
  <nav class="fixed top-0 left-0 w-full z-50 transition-all duration-500" id="main-nav">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
      <a href="../index.html" class="flex items-center space-x-2">
        <span class="text-red-600 text-3xl"><i class="fas fa-flag"></i></span>
        <span class="text-white text-xl font-bold">长征纪念</span>
      </a>
      
      <!-- 桌面导航 -->
      <div class="hidden md:flex space-x-8">
        <a href="../index.html" class="text-white hover:text-red-400 transition-colors font-medium">首页</a>
        <a href="map.html" class="text-white hover:text-red-400 transition-colors font-medium">重走长征路</a>
        <a href="data.html" class="text-white hover:text-red-400 transition-colors font-medium">牺牲人数统计</a>
        <a href="settings.html" class="text-red-400 hover:text-red-300 transition-colors font-medium">设置</a>
      </div>
      
      <!-- 移动端菜单按钮 -->
      <button class="md:hidden text-white text-2xl" id="menu-toggle">
        <i class="fas fa-bars"></i>
      </button>
    </div>
    
    <!-- 移动端导航菜单 -->
    <div class="md:hidden bg-gray-900 bg-opacity-95 w-full absolute top-full left-0 py-4 px-4 hidden" id="mobile-menu">
      <div class="flex flex-col space-y-4">
        <a href="../index.html" class="text-white hover:text-red-400 transition-colors font-medium py-2">首页</a>
        <a href="map.html" class="text-white hover:text-red-400 transition-colors font-medium py-2">重走长征路</a>
        <a href="data.html" class="text-white hover:text-red-400 transition-colors font-medium py-2">牺牲人数统计</a>
        <a href="settings.html" class="text-red-400 hover:text-red-300 transition-colors font-medium py-2">设置</a>
      </div>
    </div>
  </nav>

  <!-- 主要内容 -->
  <main class="container mx-auto px-4 pt-24 pb-12">
    <!-- 页面标题 -->
    <div class="text-center mb-12">
      <h1 class="text-4xl md:text-5xl font-bold mb-4">设置</h1>
      <p class="text-xl text-gray-400 max-w-3xl mx-auto">
        自定义您的浏览体验，选择最适合您的方式了解长征历史
      </p>
    </div>
    
    <div class="settings-container">
      <!-- 浏览模式设置 -->
      <div class="settings-card">
        <h3><i class="fas fa-eye"></i> 浏览模式</h3>
        
        <div class="setting-item">
          <div class="setting-label">
            <i class="fas fa-moon"></i>
            <span>信息型模式</span>
          </div>
          <div class="setting-description">
            布局简洁、排版清晰，强调文字快速阅读
          </div>
        </div>
        
        <div class="setting-item">
          <div class="setting-label">
            <i class="fas fa-sun"></i>
            <span>沉浸型模式</span>
          </div>
          <div class="setting-description">
            全屏交互、地图动效拉满，强调视效体验
          </div>
        </div>
        
        <div class="setting-item">
          <div class="setting-label">
            <i class="fas fa-exchange-alt"></i>
            <span>自动切换</span>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="auto-mode-toggle">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
      
      <!-- 音频设置 -->
      <div class="settings-card">
        <h3><i class="fas fa-volume-up"></i> 音频设置</h3>
        
        <div class="setting-item">
          <div class="setting-label">
            <i class="fas fa-music"></i>
            <span>背景音乐</span>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="bgm-toggle" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
        
        <div class="setting-item">
          <div class="setting-label">
            <i class="fas fa-volume-down"></i>
            <span>背景音乐音量</span>
          </div>
          <input type="range" min="0" max="100" value="50" class="w-32" id="bgm-volume">
        </div>
        
        <div class="setting-item">
          <div class="setting-label">
            <i class="fas fa-comment-dots"></i>
            <span>旁白解说</span>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="narration-toggle" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
        
        <div class="setting-item">
          <div class="setting-label">
            <i class="fas fa-volume-down"></i>
            <span>旁白音量</span>
          </div>
          <input type="range" min="0" max="100" value="70" class="w-32" id="narration-volume">
        </div>
      </div>
      
      <!-- 视觉效果设置 -->
      <div class="settings-card">
        <h3><i class="fas fa-paint-brush"></i> 视觉效果</h3>
        
        <div class="setting-item">
          <div class="setting-label">
            <i class="fas fa-snowflake"></i>
            <span>粒子特效</span>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="particles-toggle" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
        
        <div class="setting-item">
          <div class="setting-label">
            <i class="fas fa-tint"></i>
            <span>粒子特效类型</span>
          </div>
          <div class="select-container">
            <select id="particles-type">
              <option value="snow">雪花</option>
              <option value="rain">雨滴</option>
              <option value="sand">风沙</option>
              <option value="auto">根据场景自动</option>
            </select>
          </div>
        </div>
        
        <div class="setting-item">
          <div class="setting-label">
            <i class="fas fa-mountain"></i>
            <span>3D地形细节</span>
          </div>
          <div class="select-container">
            <select id="terrain-detail">
              <option value="low">低</option>
              <option value="medium" selected>中</option>
              <option value="high">高</option>
            </select>
          </div>
        </div>
        
        <div class="setting-item">
          <div class="setting-label">
            <i class="fas fa-film"></i>
            <span>时光滤镜动画</span>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="time-filter-toggle" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
      
      <!-- 性能设置 -->
      <div class="settings-card">
        <h3><i class="fas fa-tachometer-alt"></i> 性能设置</h3>
        
        <div class="setting-item">
          <div class="setting-label">
            <i class="fas fa-mobile-alt"></i>
            <span>自动适应设备性能</span>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="auto-performance-toggle" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
        
        <div class="setting-item">
          <div class="setting-label">
            <i class="fas fa-image"></i>
            <span>图片质量</span>
          </div>
          <div class="select-container">
            <select id="image-quality">
              <option value="low">低</option>
              <option value="medium" selected>中</option>
              <option value="high">高</option>
            </select>
          </div>
        </div>
      </div>
      
      <!-- 保存按钮 -->
      <div class="text-center mt-8">
        <button class="save-btn" id="save-settings">
          <i class="fas fa-save"></i> 保存设置
        </button>
      </div>
    </div>
  </main>

  <!-- 模式切换按钮 -->
  <button id="mode-toggle" class="fixed bottom-8 right-8 bg-red-600 hover:bg-red-700 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-lg z-50 transition-all transform hover:scale-110">
    <i class="fas fa-moon"></i>
  </button>

  <!-- JavaScript -->
  <script src="../js/main.js"></script>
  <script src="../js/mode-switch.js"></script>
  <script>
    // 设置页面特定脚本
    document.addEventListener('DOMContentLoaded', function() {
      // 加载保存的设置
      loadSettings();
      
      // 保存按钮点击事件
      document.getElementById('save-settings').addEventListener('click', function() {
        saveSettings();
        
        // 显示保存成功提示
        const saveBtn = this;
        const originalText = saveBtn.innerHTML;
        saveBtn.innerHTML = '<i class="fas fa-check"></i> 保存成功';
        saveBtn.disabled = true;
        
        setTimeout(() => {
          saveBtn.innerHTML = originalText;
          saveBtn.disabled = false;
        }, 2000);
      });
      
      // 自动模式切换事件
      document.getElementById('auto-mode-toggle').addEventListener('change', function() {
        const modeToggle = document.getElementById('mode-toggle');
        if (this.checked) {
          modeToggle.disabled = true;
          modeToggle.classList.add('opacity-50');
        } else {
          modeToggle.disabled = false;
          modeToggle.classList.remove('opacity-50');
        }
      });
    });
    
    /**
     * 加载保存的设置
     */
    function loadSettings() {
      const settings = JSON.parse(localStorage.getItem('longmarchSettings')) || {};
      
      // 音频设置
      if (settings.bgmEnabled !== undefined) {
        document.getElementById('bgm-toggle').checked = settings.bgmEnabled;
      }
      
      if (settings.bgmVolume !== undefined) {
        document.getElementById('bgm-volume').value = settings.bgmVolume;
      }
      
      if (settings.narrationEnabled !== undefined) {
        document.getElementById('narration-toggle').checked = settings.narrationEnabled;
      }
      
      if (settings.narrationVolume !== undefined) {
        document.getElementById('narration-volume').value = settings.narrationVolume;
      }
      
      // 视觉效果设置
      if (settings.particlesEnabled !== undefined) {
        document.getElementById('particles-toggle').checked = settings.particlesEnabled;
      }
      
      if (settings.particlesType !== undefined) {
        document.getElementById('particles-type').value = settings.particlesType;
      }
      
      if (settings.terrainDetail !== undefined) {
        document.getElementById('terrain-detail').value = settings.terrainDetail;
      }
      
      if (settings.timeFilterEnabled !== undefined) {
        document.getElementById('time-filter-toggle').checked = settings.timeFilterEnabled;
      }
      
      // 性能设置
      if (settings.autoPerformance !== undefined) {
        document.getElementById('auto-performance-toggle').checked = settings.autoPerformance;
      }
      
      if (settings.imageQuality !== undefined) {
        document.getElementById('image-quality').value = settings.imageQuality;
      }
      
      // 浏览模式设置
      if (settings.autoMode !== undefined) {
        document.getElementById('auto-mode-toggle').checked = settings.autoMode;
        
        const modeToggle = document.getElementById('mode-toggle');
        if (settings.autoMode) {
          modeToggle.disabled = true;
          modeToggle.classList.add('opacity-50');
        }
      }
    }
    
    /**
     * 保存设置
     */
    function saveSettings() {
      const settings = {
        // 音频设置
        bgmEnabled: document.getElementById('bgm-toggle').checked,
        bgmVolume: parseInt(document.getElementById('bgm-volume').value),
        narrationEnabled: document.getElementById('narration-toggle').checked,
        narrationVolume: parseInt(document.getElementById('narration-volume').value),
        
        // 视觉效果设置
        particlesEnabled: document.getElementById('particles-toggle').checked,
        particlesType: document.getElementById('particles-type').value,
        terrainDetail: document.getElementById('terrain-detail').value,
        timeFilterEnabled: document.getElementById('time-filter-toggle').checked,
        
        // 性能设置
        autoPerformance: document.getElementById('auto-performance-toggle').checked,
        imageQuality: document.getElementById('image-quality').value,
        
        // 浏览模式设置
        autoMode: document.getElementById('auto-mode-toggle').checked
      };
      
      // 保存到本地存储
      localStorage.setItem('longmarchSettings', JSON.stringify(settings));
      
      // 触发设置更改事件
      const event = new CustomEvent('settingsChange', { detail: settings });
      window.dispatchEvent(event);
    }
  </script>
</body>
</html>
