<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>重走长征路 - 长征纪念</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <!-- GSAP 动画库 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/ScrollTrigger.min.js"></script>
  <!-- OrbitControls 控制器 -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.min.js"></script>
  <!-- 确保 Three.js 加载成功 -->
  <script>
    if (typeof THREE === 'undefined') {
      console.error('Three.js 加载失败！');
      document.addEventListener('DOMContentLoaded', function() {
        const mapContainer = document.getElementById('map-container');
        if (mapContainer) {
          mapContainer.innerHTML = `
            <div class="flex items-center justify-center h-full bg-gray-900 text-white">
              <div class="text-center">
                <i class="fas fa-exclamation-triangle text-4xl mb-4 text-yellow-500"></i>
                <h3 class="text-2xl font-bold mb-2">3D地图加载失败</h3>
                <p class="mb-4">请检查网络连接并刷新页面重试</p>
                <button onclick="location.reload()" class="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-full font-bold">
                  刷新页面
                </button>
              </div>
            </div>
          `;
        }
      });
    }
  </script>
  
  <link rel="stylesheet" href="../css/style.css">
  <style>
    /* 地图页面特定样式 */
    #map-container {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }
    
    .node-info {
      position: absolute;
      bottom: 2rem;
      left: 2rem;
      width: 350px;
      background-color: rgba(17, 24, 39, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 8px;
      padding: 1.5rem;
      color: white;
      z-index: 10;
      transform: translateX(-100%);
      transition: transform 0.5s ease;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }
    
    .node-info.active {
      transform: translateX(0);
    }
    
    .node-info h3 {
      font-size: 1.5rem;
      font-weight: bold;
      margin-bottom: 0.5rem;
      color: #dc2626;
    }
    
    .node-info .date {
      font-size: 0.9rem;
      color: #d4af37;
      margin-bottom: 1rem;
    }
    
    .node-info p {
      margin-bottom: 1rem;
      line-height: 1.6;
    }
    
    .node-info .actions {
      display: flex;
      gap: 1rem;
    }
    
    .node-info .btn {
      padding: 0.5rem 1rem;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .node-info .btn-primary {
      background-color: #dc2626;
      color: white;
    }
    
    .node-info .btn-primary:hover {
      background-color: #b91c1c;
    }
    
    .node-info .btn-secondary {
      background-color: transparent;
      color: white;
      border: 1px solid white;
    }
    
    .node-info .btn-secondary:hover {
      background-color: white;
      color: #111827;
    }
    
    .map-controls {
      position: absolute;
      top: 2rem;
      right: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      z-index: 10;
    }
    
    .map-control-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background-color: rgba(17, 24, 39, 0.85);
      backdrop-filter: blur(10px);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    
    .map-control-btn:hover {
      background-color: rgba(220, 38, 38, 0.85);
      transform: scale(1.1);
    }
    
    .audio-indicator {
      position: absolute;
      bottom: 2rem;
      right: 2rem;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background-color: rgba(220, 38, 38, 0.85);
      backdrop-filter: blur(10px);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      z-index: 10;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    
    .audio-indicator:hover {
      transform: scale(1.1);
    }
    
    .audio-indicator.playing::after {
      content: '';
      position: absolute;
      top: -5px;
      left: -5px;
      right: -5px;
      bottom: -5px;
      border-radius: 50%;
      border: 2px solid rgba(220, 38, 38, 0.85);
      animation: pulse 1.5s infinite;
    }
    
    @keyframes pulse {
      0% {
        transform: scale(0.95);
        opacity: 1;
      }
      70% {
        transform: scale(1.1);
        opacity: 0;
      }
      100% {
        transform: scale(0.95);
        opacity: 0;
      }
    }
    
    .node-markers {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }
    
    .node-marker {
      position: absolute;
      width: 20px;
      height: 20px;
      background-color: #dc2626;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      cursor: pointer;
      pointer-events: auto;
      transition: all 0.3s ease;
      box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.3);
    }
    
    .node-marker:hover {
      transform: translate(-50%, -50%) scale(1.2);
      box-shadow: 0 0 0 6px rgba(220, 38, 38, 0.5);
    }
    
    .node-marker.active {
      background-color: #d4af37;
      box-shadow: 0 0 0 6px rgba(212, 175, 55, 0.5);
    }
    
    .node-marker::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 30px;
      height: 30px;
      background-color: rgba(220, 38, 38, 0.3);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      animation: ripple 2s infinite;
    }
    
    .node-marker.active::after {
      background-color: rgba(212, 175, 55, 0.3);
    }
    
    @keyframes ripple {
      0% {
        transform: translate(-50%, -50%) scale(0.8);
        opacity: 1;
      }
      100% {
        transform: translate(-50%, -50%) scale(2);
        opacity: 0;
      }
    }
    
    .node-label {
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      background-color: rgba(17, 24, 39, 0.85);
      color: white;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      font-size: 0.8rem;
      white-space: nowrap;
      margin-top: 5px;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    
    .node-marker:hover .node-label {
      opacity: 1;
    }
    
    /* 响应式设计 */
    @media (max-width: 768px) {
      .node-info {
        width: calc(100% - 2rem);
        left: 1rem;
        bottom: 1rem;
      }
      
      .map-controls {
        top: 1rem;
        right: 1rem;
        flex-direction: row;
      }
      
      .audio-indicator {
        bottom: 1rem;
        right: 1rem;
        width: 50px;
        height: 50px;
      }
    }
  </style>
</head>
<body class="overflow-x-hidden font-sans">
  <!-- 导航栏 -->
  <nav class="fixed top-0 left-0 w-full z-50 transition-all duration-500" id="main-nav">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
      <a href="../index.html" class="flex items-center space-x-2">
        <span class="text-red-600 text-3xl"><i class="fas fa-flag"></i></span>
        <span class="text-white text-xl font-bold">长征纪念</span>
      </a>
      
      <!-- 桌面导航 -->
      <div class="hidden md:flex space-x-8">
        <a href="../index.html" class="text-white hover:text-red-400 transition-colors font-medium">首页</a>
        <a href="map.html" class="text-red-400 hover:text-red-300 transition-colors font-medium">重走长征路</a>
        <a href="data.html" class="text-white hover:text-red-400 transition-colors font-medium">牺牲人数统计</a>
        <a href="settings.html" class="text-white hover:text-red-400 transition-colors font-medium">设置</a>
      </div>
      
      <!-- 移动端菜单按钮 -->
      <button class="md:hidden text-white text-2xl" id="menu-toggle">
        <i class="fas fa-bars"></i>
      </button>
    </div>
    
    <!-- 移动端导航菜单 -->
    <div class="md:hidden bg-gray-900 bg-opacity-95 w-full absolute top-full left-0 py-4 px-4 hidden" id="mobile-menu">
      <div class="flex flex-col space-y-4">
        <a href="../index.html" class="text-white hover:text-red-400 transition-colors font-medium py-2">首页</a>
        <a href="map.html" class="text-red-400 hover:text-red-300 transition-colors font-medium py-2">重走长征路</a>
        <a href="data.html" class="text-white hover:text-red-400 transition-colors font-medium py-2">牺牲人数统计</a>
        <a href="settings.html" class="text-white hover:text-red-400 transition-colors font-medium py-2">设置</a>
      </div>
    </div>
  </nav>

  <!-- 地图容器 -->
  <div id="map-container"></div>
  
  <!-- 节点标记层 -->
  <div class="node-markers" id="node-markers"></div>
  
  <!-- 节点信息面板 -->
  <div class="node-info" id="node-info">
    <h3 id="node-title">瑞金出发</h3>
    <div class="date" id="node-date">1934年10月</div>
    <p id="node-description">
      1934年10月，中央红军从瑞金出发，开始了伟大的长征。这是一次为了摆脱国民党军队的包围追击，保存革命力量的战略转移。
    </p>
    <div class="actions">
      <a href="../nodes/ruijin.html" class="btn btn-primary" id="detail-link">
        <i class="fas fa-info-circle mr-2"></i> 详细了解
      </a>
      <button class="btn btn-secondary" id="next-node">
        <i class="fas fa-arrow-right mr-2"></i> 下一站
      </button>
      <button class="btn btn-secondary" id="close-info">
        <i class="fas fa-times mr-2"></i> 关闭
      </button>
    </div>
  </div>
  
  <!-- 地图控制按钮 -->
  <div class="map-controls">
    <button class="map-control-btn" id="zoom-in" title="放大">
      <i class="fas fa-search-plus"></i>
    </button>
    <button class="map-control-btn" id="zoom-out" title="缩小">
      <i class="fas fa-search-minus"></i>
    </button>
    <button class="map-control-btn" id="reset-view" title="重置视图">
      <i class="fas fa-home"></i>
    </button>
  </div>
  
  <!-- 音频控制按钮 -->
  <div class="audio-indicator" id="audio-control" title="播放/暂停背景音乐">
    <i class="fas fa-volume-up"></i>
  </div>
  
  <!-- 模式切换按钮 -->
  <button id="mode-toggle" class="fixed bottom-20 right-8 bg-red-600 hover:bg-red-700 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-lg z-50 transition-all transform hover:scale-110">
    <i class="fas fa-moon"></i>
  </button>

  <!-- JavaScript -->
  <script src="../js/main.js"></script>
  <script src="../js/mode-switch.js"></script>
  <script src="js/map.js"></script>
</body>
</html>
